<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Requirements Editor</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; background:#f6f8fa; padding:24px }
    .box { background: #fff; border-radius:8px; padding:18px; box-shadow:0 6px 18px rgba(0,0,0,0.06); max-width:980px; margin:auto }
    textarea { width:100%; height:420px; font-family: monospace; font-size:14px; padding:12px; border-radius:8px; border:1px solid #e1e4e8 }
    .controls { display:flex; gap:8px; margin:12px 0 16px 0; align-items:center }
    button { padding:8px 12px; border-radius:6px; border:1px solid #ccc; background:#fff; cursor:pointer }
    .status { margin-left:12px; color:#666 }
  </style>
</head>
<body>
  <div class="box">
    <h2>Requirements (requirements/features.txt)</h2>
    <div class="controls">
      <button id="save">Save</button>
      <button id="refresh">Refresh</button>
      <button id="raw">Open Raw File</button>
      <label class="status" id="status">Loading…</label>
    </div>
    <textarea id="editor" spellcheck="false">Loading...</textarea>
    <div style="margin-top:10px;color:#444;font-size:13px">Auto-refresh: <span id="autoref">ON</span> — Last loaded: <span id="loaded">-</span></div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');
    const loaded = document.getElementById('loaded');
    const autoref = document.getElementById('autoref');
    let lastText = '';
    let editing = false;
    let autoRefresh = true;

    async function load() {
      try {
        const res = await fetch('/requirements/features.txt');
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const text = await res.text();
        if (text !== lastText && !editing) {
          editor.value = text;
          lastText = text;
          loaded.textContent = new Date().toLocaleString();
        }
        status.textContent = 'Loaded';
      } catch (err) {
        status.textContent = 'Error: ' + err.message;
      }
    }

    async function save() {
      try {
        status.textContent = 'Saving...';
        const res = await fetch('/save', { method: 'POST', headers: { 'Content-Type':'text/plain' }, body: editor.value });
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const j = await res.json();
        if (j.success) {
          status.textContent = 'Saved';
          lastText = editor.value;
          loaded.textContent = new Date().toLocaleString();
        } else {
          status.textContent = 'Save failed';
        }
      } catch (err) {
        status.textContent = 'Error: ' + err.message;
      }
    }

    // UI bindings
    document.getElementById('save').addEventListener('click', async ()=> { editing=false; await save(); });
    document.getElementById('refresh').addEventListener('click', ()=> { editing=false; load(); });
    document.getElementById('raw').addEventListener('click', ()=> window.open('/requirements/features.txt','_blank'));

    editor.addEventListener('input', ()=> { editing = true; status.textContent = 'Editing'; });

    // Auto-refresh loop
    setInterval(()=>{ if (autoRefresh) load(); }, 3000);

    // Toggle auto-refresh with double-click on label
    autoref.addEventListener('dblclick', ()=>{ autoRefresh = !autoRefresh; autoref.textContent = autoRefresh? 'ON':'OFF'; });

    // Initial load
    load();
  </script>
</body>
</html>
